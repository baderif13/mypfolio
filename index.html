<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>bdrspen</title>

<link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

<!-- Polyfill: enables import maps on iOS Safari < 16.4 -->
<script async src="https://unpkg.com/es-module-shims@1.10.0/dist/es-module-shims.js"></script>

<script type="importmap">
{
  "imports": {
    "three":         "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    padding: env(safe-area-inset-top)  env(safe-area-inset-right)
             env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /*
    LAYOUT (top → bottom):
      ① bdrspen arc title  (SVG, z:21, always on top)
      ② 3-D model          (Three.js canvas, z:20, transparent, no pointer events)
      ③ social buttons     (fixed bottom row, z:15)
      — hint overlay       (z:25, center of model area)
      — orbit-target       (z:10, catches OrbitControls drag)
  */

  /* Three.js canvas — full screen, transparent, passes pointer events through */
  #c {
    position: fixed;
    inset: 0;
    z-index: 20;
    pointer-events: none;
  }

  /* OrbitControls event-capture div */
  #orbit-target {
    position: fixed;
    inset: 0;
    z-index: 10;
    cursor: grab;
  }
  #orbit-target:active { cursor: grabbing; }

  /* Arc title SVG */
  #arc-svg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 21;
    pointer-events: none;
    overflow: visible;
  }

  /* ── Bottom button row ──────────────────────────── */
  #btn-track {
    position: fixed;
    bottom: 11%;
    left: 0;
    right: 0;
    z-index: 15;
    /* scrollable on very small screens */
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scroll-snap-type: x mandatory;
    scrollbar-width: none;
  }
  #btn-track::-webkit-scrollbar { display: none; }

  #btn-row {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 22px;
    padding: 0 24px;
    width: max-content;
    min-width: 100%;
  }

  .btn-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    scroll-snap-align: center;
    flex-shrink: 0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-circle {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: #ddd;
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(255,255,255,0.16);
    backdrop-filter: blur(10px);
    transition: background .22s, box-shadow .22s, transform .18s;
  }
  .btn-item:hover  .btn-circle,
  .btn-item:active .btn-circle {
    background: rgba(255,255,255,0.15);
    box-shadow: 0 0 22px rgba(255,255,255,0.12);
    transform: scale(1.08);
  }

  .btn-label {
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    transition: color .22s;
  }
  .btn-item:hover .btn-label { color: rgba(255,255,255,0.8); }

  /* ── Hint overlay (no frame, just text + icons) ── */
  #hint {
    position: fixed;
    left: 50%;
    top: 44%;
    transform: translate(-50%, -50%) translateY(14px);
    z-index: 25;
    pointer-events: none;
    text-align: center;
    opacity: 0;
    transition: opacity .5s ease, transform .5s ease;
  }
  #hint.show {
    opacity: 1;
    transform: translate(-50%, -50%) translateY(0);
  }

  .hint-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    margin: 5px 0;
  }
  .hint-row i   { color: rgba(255,255,255,.55); font-size: 13px; }
  .hint-row span {
    font-size: 11px;
    letter-spacing: .13em;
    text-transform: uppercase;
    color: rgba(255,255,255,.42);
  }

  /* animated hand (slide hint) */
  .h-hand { animation: h-swipe 1.3s ease-in-out infinite; }
  @keyframes h-swipe {
    0%,100% { transform: translateX(-8px); opacity:.45; }
    50%     { transform: translateX( 8px); opacity:1;   }
  }
  /* spinning rotate (model hint) */
  .h-spin { animation: h-rotate 2s linear infinite; }
  @keyframes h-rotate {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* ── Loading screen ── */
  #loading {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 999;
    transition: opacity .8s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }

  .loading-ring {
    width: 44px; height: 44px;
    border: 3px solid rgba(255,255,255,.08);
    border-top-color: rgba(255,255,255,.65);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 12px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: rgba(255,255,255,.38);
  }

  /* ── Footer ── */
  #footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 15;
    text-align: center;
    padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
  }

  #footer a {
    font-size: 11px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: rgba(255,255,255,.3);
    text-decoration: none;
    transition: color .25s;
  }
  #footer a:hover { color: rgba(255,255,255,.75); }

  @media (max-width: 430px) {
    .btn-circle { width: 54px; height: 54px; font-size: 20px; }
    .btn-label  { font-size: 8px; }
    #btn-row    { gap: 16px; }
  }
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="loading-ring"></div>
  <span class="loading-text">loading</span>
</div>

<!-- Three.js canvas (model, transparent, top layer) -->
<canvas id="c"></canvas>

<!-- OrbitControls catch div -->
<div id="orbit-target"></div>

<!-- ① Arc title (SVG textPath) -->
<svg id="arc-svg" aria-hidden="true">
  <defs><path id="arc-path" d="" fill="none"/></defs>
  <text id="arc-text-el" text-anchor="middle" dominant-baseline="auto">
    <textPath href="#arc-path" startOffset="50%">
      <tspan id="typing-text"></tspan>
    </textPath>
  </text>
</svg>

<!-- ③ Social buttons — horizontal row below model -->
<div id="btn-track">
  <div id="btn-row">

    <a class="btn-item" href="https://www.instagram.com/bdrspen"
       target="_blank" rel="noopener" aria-label="Instagram">
      <div class="btn-circle"><i class="fab fa-instagram"></i></div>
      <span class="btn-label">Instagram</span>
    </a>

    <a class="btn-item" href="https://www.pinterest.com/bdrspen"
       target="_blank" rel="noopener" aria-label="Pinterest">
      <div class="btn-circle"><i class="fab fa-pinterest"></i></div>
      <span class="btn-label">Pinterest</span>
    </a>

    <a class="btn-item" href="https://www.tiktok.com/@bdrspen"
       target="_blank" rel="noopener" aria-label="TikTok">
      <div class="btn-circle"><i class="fab fa-tiktok"></i></div>
      <span class="btn-label">TikTok</span>
    </a>

    <a class="btn-item" href="https://upscrolled.com/bdrspen"
       target="_blank" rel="noopener" aria-label="Upscrolled">
      <div class="btn-circle"><i class="fa-solid fa-scroll"></i></div>
      <span class="btn-label">Upscrolled</span>
    </a>

  </div>
</div>

<!-- Footer -->
<footer id="footer">
  <a href="mailto:workido997@gmail.com">contact me here</a>
</footer>

<!-- Hint overlay — both lines together, no frame, over the model -->
<div id="hint" role="status" aria-live="polite">
  <div class="hint-row">
    <i class="fa-solid fa-hand-pointer h-hand"></i>
    <span>slide buttons</span>
    <i class="fa-solid fa-hand-pointer h-hand" style="transform:scaleX(-1)"></i>
  </div>
  <div class="hint-row">
    <i class="fa-solid fa-arrows-rotate h-spin"></i>
    <span>drag to explore model</span>
  </div>
</div>

<script type="module">
import * as THREE          from 'three';
import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader }      from 'three/addons/loaders/GLTFLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ── Renderer (transparent canvas) ─────────────────────────
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping         = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace    = THREE.SRGBColorSpace;

// ── Scene ─────────────────────────────────────────────────
const scene = new THREE.Scene();

const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment()).texture;
pmrem.dispose();

scene.add(new THREE.AmbientLight(0xffffff, 0.12));

// ── Camera ────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(0, 0, 7);

// ── OrbitControls ─────────────────────────────────────────
const controls = new OrbitControls(camera, document.getElementById('orbit-target'));
controls.enableDamping   = true;
controls.dampingFactor   = 0.08;
controls.minDistance     = 2;
controls.maxDistance     = 14;
controls.autoRotate      = false;

// ── Animation mixer ───────────────────────────────────────
const clock = new THREE.Clock();
let   mixer = null;

// ── Load model ────────────────────────────────────────────
const loadingEl   = document.getElementById('loading');
const loadingText = loadingEl.querySelector('.loading-text');
const safetyTimer = setTimeout(() => loadingEl.classList.add('hidden'), 15000);

const manager  = new THREE.LoadingManager();
manager.onLoad = () => { clearTimeout(safetyTimer); loadingEl.classList.add('hidden'); };

new GLTFLoader(manager).load(
  'https://raw.githubusercontent.com/lokanoka/bdrspen-assets/refs/heads/main/bdrspen-model.glb',
  ({ scene: model, animations }) => {

    const box    = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size   = box.getSize(new THREE.Vector3());
    model.position.sub(center);
    model.scale.setScalar(3.4 / Math.max(size.x, size.y, size.z));

    // Shift model up slightly so it sits between title and buttons
    model.position.y += 0.18;

    model.traverse(child => {
      if (!child.isMesh) return;
      const mats = Array.isArray(child.material) ? child.material : [child.material];
      mats.forEach(m => {
        if (m.emissive && m.emissive.r + m.emissive.g + m.emissive.b > 0.01)
          m.emissiveIntensity = Math.min(m.emissiveIntensity * 2, 3);
      });
    });

    scene.add(model);

    if (animations && animations.length > 0) {
      mixer = new THREE.AnimationMixer(model);
      mixer.timeScale = 0.35;
      animations.forEach(clip => mixer.clipAction(clip).play());
    }
  },
  xhr => {
    if (xhr.lengthComputable) {
      const pct = Math.round(xhr.loaded / xhr.total * 100);
      loadingText.textContent = `loading ${pct}%`;
    }
  },
  err => {
    console.error(err);
    loadingText.textContent = 'model unavailable';
    setTimeout(() => loadingEl.classList.add('hidden'), 2000);
  }
);

// ── Resize ────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  updateArcPath();
});

// ────────────────────────────────────────────────────────────
// ARC TITLE  — bdrspen curves over the top of the model
// ────────────────────────────────────────────────────────────
const arcPathEl = document.getElementById('arc-path');
const arcTextEl = document.getElementById('arc-text-el');
const typingEl  = document.getElementById('typing-text');

function getR() {
  // radius that sits just above the model's top edge
  return Math.min(innerWidth * 0.38, innerHeight * 0.27, 250);
}

function updateArcPath() {
  const cx = innerWidth  / 2;
  const cy = innerHeight / 2;
  const R  = getR();

  // Pure circle arc, -162° → -18° (144° sweep = strong half-circle curve)
  const a1 = -162 * Math.PI / 180;
  const a2 =  -18 * Math.PI / 180;
  const x1 = cx + R * Math.cos(a1);
  const y1 = cy + R * Math.sin(a1);
  const x2 = cx + R * Math.cos(a2);
  const y2 = cy + R * Math.sin(a2);

  arcPathEl.setAttribute('d', `M ${x1} ${y1} A ${R} ${R} 0 0 1 ${x2} ${y2}`);

  const fs = Math.max(13, Math.min(19, innerWidth * 0.016));
  const ls = Math.max(7,  Math.min(13, innerWidth * 0.011));
  arcTextEl.setAttribute('font-size',      fs);
  arcTextEl.setAttribute('letter-spacing', ls);
  arcTextEl.setAttribute('fill',           '#ffffff');
  arcTextEl.setAttribute('font-family',    "'Segoe UI', system-ui, sans-serif");
  arcTextEl.setAttribute('font-weight',    '700');
}
updateArcPath();

// ────────────────────────────────────────────────────────────
// TYPEWRITER on the arc
// ────────────────────────────────────────────────────────────
const WORD   = 'bdrspen';
let charIdx  = 0;
let erasing  = false;
let cursorOn = true;

setInterval(() => { cursorOn = !cursorOn; redraw(); }, 530);

function redraw() {
  typingEl.textContent = WORD.slice(0, charIdx) + (cursorOn ? '|' : '\u00a0');
}

function tick() {
  if (!erasing) {
    charIdx++;
    redraw();
    if (charIdx >= WORD.length) {
      setTimeout(() => { erasing = true; tick(); }, 2100);
      return;
    }
    setTimeout(tick, 115);
  } else {
    charIdx--;
    redraw();
    if (charIdx <= 0) {
      charIdx = 0;
      erasing = false;
      setTimeout(tick, 480);
      return;
    }
    setTimeout(tick, 72);
  }
}
setTimeout(tick, 700);

// ────────────────────────────────────────────────────────────
// TUTORIAL HINT  — both lines together, no frame, over model
// Shows every 7 s, dismissed on first interaction
// ────────────────────────────────────────────────────────────
const hintEl   = document.getElementById('hint');
let dismissed  = false;
let hintTimer  = null;

function showHint() {
  if (dismissed) return;
  hintEl.classList.add('show');
  setTimeout(() => {
    hintEl.classList.remove('show');
    if (!dismissed) hintTimer = setTimeout(showHint, 7000);
  }, 3500);
}

hintTimer = setTimeout(showHint, 2200);

document.addEventListener('pointerdown', () => {
  dismissed = true;
  clearTimeout(hintTimer);
  hintEl.classList.remove('show');
}, { once: true });

// ── Render loop ───────────────────────────────────────────
(function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  if (mixer) mixer.update(delta);
  controls.update();
  renderer.render(scene, camera);
})();
</script>

</body>
</html>
