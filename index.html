<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>bdrspen</title>

<link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<link rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" />

<script async src="https://unpkg.com/es-module-shims@1.10.0/dist/es-module-shims.js"></script>

<script type="importmap">
{
  "imports": {
    "three":         "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #F5F5F0;
    background-attachment: fixed;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    padding: env(safe-area-inset-top)  env(safe-area-inset-right)
             env(safe-area-inset-bottom) env(safe-area-inset-left);
  }


  #c {
    position: fixed; inset: 0;
    z-index: 20; pointer-events: none;
  }

  #orbit-target {
    position: fixed; inset: 0;
    z-index: 10; cursor: grab;
  }
  #orbit-target:active { cursor: grabbing; }

  #arc-svg { display: none; }

  /* ── Name text behind model ── */
  #name-text {
    position: fixed;
    bottom: 16%;
    left: 0; right: 0;
    z-index: 12;
    text-align: center;
    pointer-events: none;
    padding: 0 16px;
  }
  #en-name {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2.2rem, 9vw, 4rem);
    color: #007A3D;
    line-height: 1.3;
    letter-spacing: 0.03em;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.12);
  }
  #ar-name {
    font-family: 'Cairo', sans-serif;
    font-size: clamp(1.4rem, 6vw, 2.6rem);
    color: #007A3D;
    line-height: 1.6;
    direction: rtl;
    font-weight: 700;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.12);
  }

  /* ── Bottom button row ── */
  #btn-track {
    position: fixed;
    top: 14px;
    left: 0; right: 0; z-index: 25;
    overflow-x: auto;
    overflow-y: clip;
    -webkit-overflow-scrolling: touch;
    scroll-snap-type: x mandatory;
    scrollbar-width: none;
    padding: 14px 0;
  }
  #btn-track::-webkit-scrollbar { display: none; }

  #btn-row {
    display: flex; align-items: flex-start;
    justify-content: center; gap: 22px;
    padding: 0 28px; width: max-content; min-width: 100%;
  }

  /* ── Glass circle button ── */
  .btn-item {
    display: flex; flex-direction: column-reverse;
    align-items: center; gap: 6px;
    text-decoration: none; scroll-snap-align: center;
    flex-shrink: 0; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-circle {
    width: 66px; height: 66px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    color: rgba(255,255,255,0.92);
    position: relative;
    border: 1px solid rgba(255,255,255,0.18);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: transform .22s cubic-bezier(.34,1.56,.64,1);
    will-change: transform;
    /* 5-petal rounded flower */
    clip-path: url(#flower-clip);
  }

  /* specular top-left shine */
  .btn-circle::before {
    content: '';
    position: absolute; top: 7%; left: 10%;
    width: 44%; height: 32%;
    background: radial-gradient(ellipse, rgba(255,255,255,0.60) 0%, transparent 78%);
    border-radius: 50%; pointer-events: none; z-index: 1;
  }

  /* bottom micro-reflection */
  .btn-circle::after {
    content: '';
    position: absolute; bottom: 9%; right: 12%;
    width: 26%; height: 18%;
    background: radial-gradient(ellipse, rgba(255,255,255,0.18) 0%, transparent 80%);
    border-radius: 50%; pointer-events: none; z-index: 1;
  }

  .btn-circle i { position: relative; z-index: 2; }
  .btn-item:hover .btn-circle { transform: translateY(-4px) scale(1.07); }

  .btn-label {
    font-size: 10px; letter-spacing: .12em;
    text-transform: uppercase;
    color: rgba(0,0,0,0.50);
    transition: color .22s;
  }
  .btn-item:hover .btn-label { color: rgba(0,0,0,0.85); }

  /* ── Bounce / squish on interact ── */
  @keyframes ball-squish {
    0%   { transform: scale(1); }
    18%  { transform: scaleX(1.22) scaleY(0.78); }
    42%  { transform: scaleX(0.86) scaleY(1.18) translateY(-10px); }
    65%  { transform: scaleX(1.07) scaleY(0.95) translateY(0); }
    82%  { transform: scaleX(0.97) scaleY(1.04); }
    100% { transform: scale(1); }
  }
  .btn-circle.popping { animation: ball-squish .5s cubic-bezier(.36,.07,.19,.97) both; }

  /* ── Per-ball Kuwait flag colors ── */
  /* Instagram = Kuwait Green */
  .ball-yellow {
    background: radial-gradient(circle at 32% 28%,
      rgba(100,200,140,0.90) 0%,
      rgba(0,122,61,0.92)    40%,
      rgba(0,45,22,0.96)     75%);
    box-shadow: 0 3px 10px rgba(0,122,61,0.30),
                inset 0 1px 0 rgba(100,200,140,0.20);
    border-color: rgba(0,122,61,0.40);
  }
  /* Pinterest = Kuwait White */
  .ball-blue {
    background: radial-gradient(circle at 32% 28%,
      rgba(255,255,255,0.98) 0%,
      rgba(225,225,225,0.92) 40%,
      rgba(175,175,175,0.88) 75%);
    box-shadow: 0 3px 12px rgba(0,0,0,0.15),
                inset 0 1px 0 rgba(255,255,255,0.60);
    border-color: rgba(180,180,180,0.45);
    color: rgba(0,0,0,0.75);
  }
  /* TikTok = Kuwait Red */
  .ball-red {
    background: radial-gradient(circle at 32% 28%,
      rgba(255,110,120,0.88) 0%,
      rgba(206,17,38,0.92)   40%,
      rgba(80,0,15,0.96)     75%);
    box-shadow: 0 3px 10px rgba(206,17,38,0.28),
                inset 0 1px 0 rgba(255,110,120,0.20);
    border-color: rgba(206,17,38,0.40);
  }
  /* Upscrolled = Kuwait Black */
  .ball-green {
    background: radial-gradient(circle at 32% 28%,
      rgba(110,110,110,0.85) 0%,
      rgba(25,25,25,0.92)    40%,
      rgba(0,0,0,0.97)       75%);
    box-shadow: 0 3px 10px rgba(0,0,0,0.35),
                inset 0 1px 0 rgba(150,150,150,0.18);
    border-color: rgba(80,80,80,0.35);
  }

  /* ── Hint overlay ── */
  #hint {
    position: fixed; left: 50%; top: 44%;
    transform: translate(-50%, -50%) translateY(14px);
    z-index: 25; pointer-events: none;
    text-align: center; opacity: 0;
    transition: opacity .5s ease, transform .5s ease;
  }
  #hint.show { opacity: 1; transform: translate(-50%, -50%) translateY(0); }

  .hint-row {
    display: flex; align-items: center;
    justify-content: center; gap: 9px; margin: 5px 0;
  }
  .hint-row i   { color: rgba(0,0,0,.45); font-size: 13px; }
  .hint-row span {
    font-size: 11px; letter-spacing: .13em;
    text-transform: uppercase; color: rgba(0,0,0,.38);
  }

  .h-hand { animation: h-swipe 1.3s ease-in-out infinite; }
  @keyframes h-swipe {
    0%,100% { transform: translateX(-8px); opacity:.45; }
    50%     { transform: translateX( 8px); opacity:1;   }
  }
  .h-spin { animation: h-rotate 2s linear infinite; }
  @keyframes h-rotate { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }

  /* ── Loading ── flower draw animation */
  #loading {
    position: fixed; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    display: flex; flex-direction: column;
    align-items: center; gap: 6px;
    z-index: 999; transition: opacity .7s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  #rose-path {
    transition: stroke-dashoffset 0.3s ease;
  }
  .loading-text {
    font-family: 'Fredoka One', cursive;
    font-size: 15px; color: #007A3D;
    letter-spacing: 0.05em;
  }

  /* ── Footer ── */
  #footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    z-index: 25; text-align: center;
    padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
  }
  #footer a {
    font-size: 11px; letter-spacing: .12em;
    text-transform: uppercase; text-decoration: none;
    font-weight: 700;
    color: #007A3D;
    display: inline-block; /* needed so translateY works */
    text-shadow: 0 0 6px rgba(0,122,61,0.35);
    animation: pick-me 3s ease-in-out infinite;
  }
  @keyframes pick-me {
    /* sit still most of the time, then do two quick hops */
    0%        { transform: translateY(0);    }
    88%       { transform: translateY(0);    }
    91%       { transform: translateY(-10px); }
    94%       { transform: translateY(0);    }
    97%       { transform: translateY(-6px); }
    100%      { transform: translateY(0);    }
  }

  @media (max-width: 430px) {
    .btn-circle { width: 54px; height: 54px; font-size: 19px; }
    .btn-label  { font-size: 8px; }
    #btn-row    { gap: 16px; }
  }
</style>
</head>
<body>


<div id="loading">
  <svg viewBox="0 0 100 100" width="120" height="120">
    <path id="rose-path" fill="none" stroke="#007A3D" stroke-width="2.2"
          stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <span class="loading-text">0%</span>
</div>

<!-- Flower clip-path definition -->
<svg width="0" height="0" style="position:absolute;overflow:hidden">
  <defs>
    <clipPath id="flower-clip" clipPathUnits="objectBoundingBox">
      <ellipse cx="0.5" cy="0.2"  rx="0.19" ry="0.31"/>
      <ellipse cx="0.5" cy="0.2"  rx="0.19" ry="0.31" transform="rotate(72,0.5,0.5)"/>
      <ellipse cx="0.5" cy="0.2"  rx="0.19" ry="0.31" transform="rotate(144,0.5,0.5)"/>
      <ellipse cx="0.5" cy="0.2"  rx="0.19" ry="0.31" transform="rotate(216,0.5,0.5)"/>
      <ellipse cx="0.5" cy="0.2"  rx="0.19" ry="0.31" transform="rotate(288,0.5,0.5)"/>
      <circle cx="0.5" cy="0.5" r="0.17"/>
    </clipPath>
  </defs>
</svg>

<canvas id="c"></canvas>
<div id="orbit-target"></div>

<!-- Name text — behind 3D model (z-index 12 < canvas z-index 20) -->
<div id="name-text">
  <div id="en-name"><span id="typing-en"></span></div>
  <div id="ar-name"><span id="typing-ar"></span></div>
</div>

<!-- Arc SVG kept for structure but hidden -->
<svg id="arc-svg" aria-hidden="true">
  <defs>
    <path id="arc-path" d="" fill="none"/>
    <!-- shadow so yellow stays legible on white bg half -->
    <filter id="txt-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="rgba(0,0,0,0.55)"/>
    </filter>
  </defs>
  <text id="arc-text-el" text-anchor="middle" dominant-baseline="auto">
    <textPath href="#arc-path" startOffset="50%">
      <tspan id="typing-text"></tspan>
    </textPath>
  </text>
</svg>

<!-- Social buttons — colored glass balls -->
<div id="btn-track">
  <div id="btn-row">
    <a class="btn-item" href="https://www.instagram.com/bdrspen"
       target="_blank" rel="noopener" aria-label="Instagram">
      <div class="btn-circle ball-yellow"><i class="fab fa-instagram"></i></div>
      <span class="btn-label">Instagram</span>
    </a>
    <a class="btn-item" href="https://www.pinterest.com/bdrspen"
       target="_blank" rel="noopener" aria-label="Pinterest">
      <div class="btn-circle ball-blue"><i class="fab fa-pinterest"></i></div>
      <span class="btn-label">Pinterest</span>
    </a>
    <a class="btn-item" href="https://www.tiktok.com/@bdrspen"
       target="_blank" rel="noopener" aria-label="TikTok">
      <div class="btn-circle ball-red"><i class="fab fa-tiktok"></i></div>
      <span class="btn-label">TikTok</span>
    </a>
    <a class="btn-item" href="https://upscrolled.com/bdrspen"
       target="_blank" rel="noopener" aria-label="Upscrolled">
      <div class="btn-circle ball-green"><i class="fa-solid fa-scroll"></i></div>
      <span class="btn-label">Upscrolled</span>
    </a>
  </div>
</div>

<footer id="footer">
  <a href="mailto:workido997@gmail.com">contact me here</a>
</footer>

<div id="hint" role="status" aria-live="polite">
  <div class="hint-row">
    <i class="fa-solid fa-hand-pointer h-hand"></i>
    <span>slide buttons</span>
    <i class="fa-solid fa-hand-pointer h-hand" style="transform:scaleX(-1)"></i>
  </div>
  <div class="hint-row">
    <i class="fa-solid fa-arrows-rotate h-spin"></i>
    <span>drag to explore model</span>
  </div>
</div>

<script type="module">
import * as THREE          from 'three';
import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader }      from 'three/addons/loaders/GLTFLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

THREE.Cache.enabled = true; // cache model for repeat visits

// ── Renderer ──────────────────────────────────────────────
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, alpha: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(1);
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping         = THREE.LinearToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputColorSpace    = THREE.SRGBColorSpace;

// ── Scene ─────────────────────────────────────────────────
const scene = new THREE.Scene();
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment()).texture;
scene.environmentIntensity = 0.9;
pmrem.dispose();
scene.add(new THREE.AmbientLight(0xffffff, 0.5));

// ── Camera ────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(0, 0, 7);

// ── OrbitControls ─────────────────────────────────────────
const controls = new OrbitControls(camera, document.getElementById('orbit-target'));
controls.target.set(0, 0.15, 0);
controls.enableDamping   = true;
controls.dampingFactor   = 0.08;
controls.minDistance     = 2;
controls.maxDistance     = 14;
controls.autoRotate      = false;

const clock = new THREE.Clock();
let   mixer = null;

// ── White surface flicker ──────────────────────────────────
let sparkMats = [];
let sparkTime = 0;

// ── Ball spark trail ───────────────────────────────────────
const TRAIL_MAX  = 90;
let   trailHead  = 0;
const trailPos   = new Float32Array(TRAIL_MAX * 3).fill(9999);
const trailCol   = new Float32Array(TRAIL_MAX * 3);
const trailLife  = new Float32Array(TRAIL_MAX);
const trailVel   = Array.from({length: TRAIL_MAX}, () => new THREE.Vector3());
let   ballObjects = [];   // white ball meshes found in model

const trailGeo = new THREE.BufferGeometry();
trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPos, 3));
trailGeo.setAttribute('color',    new THREE.BufferAttribute(trailCol, 3));

const trailMat = new THREE.PointsMaterial({
  size: 0.055,
  vertexColors: true,
  transparent: true,
  opacity: 0.92,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  sizeAttenuation: true,
});
const trailPoints = new THREE.Points(trailGeo, trailMat);
scene.add(trailPoints);

// ── Load model ────────────────────────────────────────────
const loadingEl   = document.getElementById('loading');
const loadingText = loadingEl.querySelector('.loading-text');

// ── Rose path: r = cos(2.5t), t in [0, 4π] ──────────────
const roseSvgPath = document.getElementById('rose-path');
{ let d = '';
  for (let i = 0; i <= 300; i++) {
    const t = (i / 300) * 4 * Math.PI;
    const r = 40 * Math.cos(2.5 * t);
    const x = (50 + r * Math.cos(t)).toFixed(2);
    const y = (50 + r * Math.sin(t)).toFixed(2);
    d += (i === 0 ? 'M' : 'L') + x + ',' + y + ' ';
  }
  roseSvgPath.setAttribute('d', d.trim());
}
const roseLen = roseSvgPath.getTotalLength();
roseSvgPath.style.strokeDasharray  = roseLen;
roseSvgPath.style.strokeDashoffset = roseLen;

function setFlowerProgress(pct) {
  roseSvgPath.style.strokeDashoffset = roseLen * (1 - pct / 100);
  loadingText.textContent = Math.round(pct) + '%';
}

const safetyTimer = setTimeout(() => loadingEl.classList.add('hidden'), 120000);
const manager  = new THREE.LoadingManager();
manager.onLoad = () => {
  clearTimeout(safetyTimer);
  setFlowerProgress(100);
  setTimeout(() => loadingEl.classList.add('hidden'), 600);
};

new GLTFLoader(manager).load(
  'https://huggingface.co/datasets/workib2/b2/resolve/main/bdrspen-model.glb',
  ({ scene: model, animations }) => {

    // Scale first, then center
    const box1 = new THREE.Box3().setFromObject(model);
    const size = box1.getSize(new THREE.Vector3());
    model.scale.setScalar(3.4 / Math.max(size.x, size.y, size.z));

    const box2   = new THREE.Box3().setFromObject(model);
    const center = box2.getCenter(new THREE.Vector3());
    model.position.sub(center);

    model.traverse(child => {
      if (!child.isMesh) return;
      const mats = Array.isArray(child.material) ? child.material : [child.material];
      mats.forEach(m => {
        // Boost existing orange emission from Blender
        if (m.emissive && m.emissive.r + m.emissive.g + m.emissive.b > 0.01)
          m.emissiveIntensity = Math.min(m.emissiveIntensity * 2, 3);

        // Collect light/white surfaces for flicker
        if (m.color && m.color.r > 0.55 && m.color.g > 0.55 && m.color.b > 0.55) {
          if (!m.emissive) m.emissive = new THREE.Color(0xffffff);
          else m.emissive.set(0xffffff);
          m.emissiveIntensity = 0.18;
          sparkMats.push(m);
        }
      });

      // Identify small spherical white-ball meshes for spark trail
      if (child.geometry) {
        const bbox = new THREE.Box3().setFromObject(child);
        const sz   = bbox.getSize(new THREE.Vector3());
        const mx   = Math.max(sz.x, sz.y, sz.z);
        const mn   = Math.min(sz.x, sz.y, sz.z);
        const mat  = Array.isArray(child.material) ? child.material[0] : child.material;
        const isLight = mat && mat.color &&
                        mat.color.r > 0.5 && mat.color.g > 0.5 && mat.color.b > 0.5;
        const isSmall  = mx < 0.6;   // small object in model-space
        const isRound  = mn / mx > 0.55; // roughly spherical
        if (isLight && isSmall && isRound) ballObjects.push(child);
      }
    });

    scene.add(model);

    if (animations && animations.length > 0) {
      mixer = new THREE.AnimationMixer(model);
      animations.forEach(clip => mixer.clipAction(clip).play());
    }
  },
  xhr => {
    if (xhr.lengthComputable)
      setFlowerProgress(xhr.loaded / xhr.total * 100);
  },
  err => {
    console.error(err);
    loadingText.textContent = 'model unavailable';
    setTimeout(() => loadingEl.classList.add('hidden'), 2000);
  }
);

// ── Resize ────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});


// ── Typewriter (English + Arabic) ────────────────────────
const enEl = document.getElementById('typing-en');
const arEl = document.getElementById('typing-ar');

let cursorOn = true;
setInterval(() => { cursorOn = !cursorOn; }, 530);

function makeTyper(el, word, startDelay) {
  let idx = 0, erasing = false;
  function draw() {
    el.textContent = word.slice(0, idx) + (cursorOn ? '|' : '\u00a0');
  }
  function tick() {
    if (!erasing) {
      draw(); idx++;
      if (idx > word.length) {
        idx = word.length;
        setTimeout(() => { erasing = true; tick(); }, 2200);
        return;
      }
      setTimeout(tick, 110);
    } else {
      idx--; draw();
      if (idx <= 0) { idx = 0; erasing = false; setTimeout(tick, 500); return; }
      setTimeout(tick, 68);
    }
  }
  setInterval(draw, 530); // keep cursor blinking
  setTimeout(tick, startDelay);
}

makeTyper(enEl, 'bdrspen', 700);
makeTyper(arEl, 'بدر الفيلكاوي', 900);

// ── Ball squish / bounce on interaction ───────────────────
document.querySelectorAll('.btn-circle').forEach(ball => {
  ball.addEventListener('pointerdown', () => {
    ball.classList.remove('popping');
    void ball.offsetWidth;
    ball.classList.add('popping');
  });
  ball.addEventListener('animationend', () => ball.classList.remove('popping'));
});

// ── Tutorial hint ─────────────────────────────────────────
const hintEl  = document.getElementById('hint');
let dismissed = false, hintTimer = null;
function showHint() {
  if (dismissed) return;
  hintEl.classList.add('show');
  setTimeout(() => {
    hintEl.classList.remove('show');
    if (!dismissed) hintTimer = setTimeout(showHint, 7000);
  }, 3500);
}
hintTimer = setTimeout(showHint, 2200);
document.addEventListener('pointerdown', () => {
  dismissed = true; clearTimeout(hintTimer); hintEl.classList.remove('show');
}, { once: true });

// ── Render loop ───────────────────────────────────────────
const _wp = new THREE.Vector3(); // reused world-position vector
let frameCount = 0;

(function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  sparkTime += delta;
  frameCount++;

  if (mixer) mixer.update(delta);

  // Run heavy effects every other frame only
  if (frameCount % 2 === 0) {
    // White surface flicker
    sparkMats.forEach((m, i) => {
      const phase = sparkTime * 2.8 + i * 1.3;
      m.emissiveIntensity = 0.18 + Math.sin(phase) * 0.09;
    });

    // Ball spark trail
    ballObjects.forEach(obj => {
      obj.getWorldPosition(_wp);
      const i = trailHead % TRAIL_MAX;
      trailPos[i*3]   = _wp.x + (Math.random()-0.5)*0.02;
      trailPos[i*3+1] = _wp.y + (Math.random()-0.5)*0.02;
      trailPos[i*3+2] = _wp.z + (Math.random()-0.5)*0.02;
      trailLife[i]    = 1.0;
      trailVel[i].set(
        (Math.random()-0.5)*0.055,
        Math.random()*0.05 + 0.01,
        (Math.random()-0.5)*0.055
      );
      trailHead++;
    });

    // Update trail particles
    for (let j = 0; j < TRAIL_MAX; j++) {
      if (trailLife[j] > 0) {
        trailLife[j] -= delta * 1.6;
        const l = Math.max(0, trailLife[j]);
        trailPos[j*3]   += trailVel[j].x;
        trailPos[j*3+1] += trailVel[j].y - 0.003;
        trailPos[j*3+2] += trailVel[j].z;
        trailCol[j*3]   = l * 1.0;
        trailCol[j*3+1] = l * l * 0.55;
        trailCol[j*3+2] = 0;
        if (trailLife[j] <= 0)
          trailPos[j*3] = trailPos[j*3+1] = trailPos[j*3+2] = 9999;
      }
    }
    trailGeo.attributes.position.needsUpdate = true;
    trailGeo.attributes.color.needsUpdate    = true;
  }

  controls.update();
  renderer.render(scene, camera);
})();
</script>
