<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>bdrspen</title>

<link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

<!-- Polyfill: enables import maps on iOS Safari < 16.4 and older Android -->
<script async src="https://unpkg.com/es-module-shims@1.10.0/dist/es-module-shims.js"></script>

<script type="importmap">
{
  "imports": {
    "three":         "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    /* iOS safe-area insets (notch / home indicator) */
    padding: env(safe-area-inset-top) env(safe-area-inset-right)
             env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /*
    LAYER ORDER (back → front):
      z:10     #orbit-target  — invisible, catches OrbitControls drag/zoom
      z:15/21  .icon-wrap     — JS sets 15 (behind model) or 21 (in front) each frame
      z:20     #c             — Three.js canvas, transparent bg, no pointer events
      z:21     #arc-svg       — curved bdrspen text, always on top
  */

  /* Three.js canvas — FRONT layer, transparent, no mouse events */
  #c {
    position: fixed;
    inset: 0;
    z-index: 20;
    pointer-events: none;
  }

  /* OrbitControls catch-all div */
  #orbit-target {
    position: fixed;
    inset: 0;
    z-index: 10;
    cursor: grab;
  }
  #orbit-target:active { cursor: grabbing; }

  /* Full-screen SVG for the arc text — sits above canvas so text is never hidden */
  #arc-svg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 21;
    pointer-events: none;
    overflow: visible;
  }

  /* Icons — JS sets left/top/transform/opacity each frame */
  .icon-wrap {
    position: fixed;
    z-index: 15;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    transform: translate(-50%, -50%);
    will-change: transform, opacity;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
  }
  .icon-wrap:active { cursor: grabbing; }

  .icon-bubble {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: #eee;
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(255,255,255,0.18);
    backdrop-filter: blur(8px);
    transition: background .22s, box-shadow .22s;
  }
  .icon-wrap:hover .icon-bubble {
    background: rgba(255,255,255,0.15);
    box-shadow: 0 4px 22px rgba(255,255,255,0.12);
  }

  .icon-label {
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    transition: color .22s;
  }
  .icon-wrap:hover .icon-label { color: #fff; }

  /* Loading screen */
  #loading {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 999;
    transition: opacity .8s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }

  .loading-ring {
    width: 44px; height: 44px;
    border: 3px solid rgba(255,255,255,.1);
    border-top-color: rgba(255,255,255,.7);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 12px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: rgba(255,255,255,.4);
  }

  /* iOS phone (≤ 430px wide, portrait) */
  @media (max-width: 430px) {
    .icon-bubble { width: 50px; height: 50px; font-size: 19px; }
    .icon-label  { font-size: 8px; letter-spacing: .08em; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="loading-ring"></div>
  <span class="loading-text">loading</span>
</div>

<!-- Layer 3: Three.js (transparent, on top) -->
<canvas id="c"></canvas>

<!-- Layer 1: OrbitControls event target -->
<div id="orbit-target"></div>

<!-- Layer 2b: Curved text (SVG) -->
<svg id="arc-svg" aria-hidden="true">
  <defs>
    <path id="arc-path" d="" fill="none"/>
  </defs>
  <text id="arc-text-el" text-anchor="middle" dominant-baseline="auto">
    <textPath id="arc-tp" href="#arc-path" startOffset="50%">
      <tspan id="typing-text"></tspan>
    </textPath>
  </text>
</svg>

<!-- Layer 2: Social icons (orbiting) -->
<a class="icon-wrap" id="icon-ig"
   href="https://www.instagram.com/bdrspen"
   target="_blank" rel="noopener" aria-label="Instagram">
  <div class="icon-bubble"><i class="fab fa-instagram"></i></div>
  <span class="icon-label">Instagram</span>
</a>

<a class="icon-wrap" id="icon-pi"
   href="https://www.pinterest.com/bdrspen"
   target="_blank" rel="noopener" aria-label="Pinterest">
  <div class="icon-bubble"><i class="fab fa-pinterest"></i></div>
  <span class="icon-label">Pinterest</span>
</a>

<a class="icon-wrap" id="icon-tt"
   href="https://www.tiktok.com/@bdrspen"
   target="_blank" rel="noopener" aria-label="TikTok">
  <div class="icon-bubble"><i class="fab fa-tiktok"></i></div>
  <span class="icon-label">TikTok</span>
</a>

<a class="icon-wrap" id="icon-up"
   href="https://upscrolled.com/bdrspen"
   target="_blank" rel="noopener" aria-label="Upscrolled">
  <div class="icon-bubble"><i class="fa-solid fa-scroll"></i></div>
  <span class="icon-label">Upscrolled</span>
</a>

<script type="module">
import * as THREE          from 'three';
import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader }      from 'three/addons/loaders/GLTFLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ── Renderer (transparent → white body shows through) ─────
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping         = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace    = THREE.SRGBColorSpace;

// ── Scene ─────────────────────────────────────────────────
const scene = new THREE.Scene();
// no scene.background — stays transparent

const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment()).texture;
pmrem.dispose();

// Very dim ambient — just enough so the dark side isn't pure void on black
scene.add(new THREE.AmbientLight(0xffffff, 0.12));

// ── Camera ────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(0, 0, 7);

// ── OrbitControls on the invisible catch div ──────────────
const controls = new OrbitControls(camera, document.getElementById('orbit-target'));
controls.enableDamping   = true;
controls.dampingFactor   = 0.08;
controls.minDistance     = 2;
controls.maxDistance     = 14;
controls.autoRotate      = false; // user controls camera freely

// ── Animation mixer ───────────────────────────────────────
const clock = new THREE.Clock();
let   mixer = null;

// ── Load Blender model ────────────────────────────────────
const loadingEl   = document.getElementById('loading');
const loadingText = loadingEl.querySelector('.loading-text');

// Safety net — hide loading screen after 15 s even if model never arrives
const safetyTimer = setTimeout(() => loadingEl.classList.add('hidden'), 15000);

const manager  = new THREE.LoadingManager();
manager.onLoad = () => { clearTimeout(safetyTimer); loadingEl.classList.add('hidden'); };

new GLTFLoader(manager).load(
  'https://raw.githubusercontent.com/lokanoka/bdrspen-assets/refs/heads/main/bdrspen-model.glb',
  ({ scene: model, animations }) => {

    const box    = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size   = box.getSize(new THREE.Vector3());
    model.position.sub(center);
    model.scale.setScalar(3.4 / Math.max(size.x, size.y, size.z));

    // Boost Blender emission
    model.traverse(child => {
      if (!child.isMesh) return;
      const mats = Array.isArray(child.material) ? child.material : [child.material];
      mats.forEach(m => {
        if (m.emissive && m.emissive.r + m.emissive.g + m.emissive.b > 0.01)
          m.emissiveIntensity = Math.min(m.emissiveIntensity * 2, 3);
      });
    });

    scene.add(model);

    if (animations && animations.length > 0) {
      mixer = new THREE.AnimationMixer(model);
      mixer.timeScale = 0.35; // slow-motion: 35% of original speed
      animations.forEach(clip => mixer.clipAction(clip).play());
    }
  },
  xhr => {
    // Show live download progress so user knows something is happening
    if (xhr.lengthComputable) {
      const pct = Math.round(xhr.loaded / xhr.total * 100);
      loadingText.textContent = `loading ${pct}%`;
    }
  },
  err => {
    console.error(err);
    loadingText.textContent = 'model unavailable';
    setTimeout(() => loadingEl.classList.add('hidden'), 2000);
  }
);

// ────────────────────────────────────────────────────────────
// ICON ORBIT  (elliptical ring — flat circle viewed at angle)
// x = cx + R · cos(θ)
// y = cy + R · sin(θ) · FLAT   (FLAT < 1 gives 3-D ring look)
// ────────────────────────────────────────────────────────────
const FLAT = 0.36;            // vertical squish (tilt illusion)

const iconEls = [
  document.getElementById('icon-ig'),
  document.getElementById('icon-pi'),
  document.getElementById('icon-tt'),
  document.getElementById('icon-up'),
];
const N = iconEls.length;

let orbitAngle   = Math.PI * 0.6; // initial spread
let ringVelocity = 0;             // momentum after user releases drag
const FRICTION   = 0.91;          // velocity decay per frame

function getR() {
  // On portrait phones innerWidth is the short side — use it directly.
  // On landscape / desktop use the smaller dimension.
  // Cap so icons never push off-screen on very narrow viewports.
  return Math.min(innerWidth * 0.38, innerHeight * 0.29, 260);
}

function updateIcons() {
  const cx   = innerWidth  / 2;
  const cy   = innerHeight / 2;
  const R    = getR();
  const Ry   = R * FLAT;

  // Camera-zoom depth factor (icons shrink/fade when zooming into model)
  const dist  = controls.getDistance();
  const zoomT = Math.max(0, Math.min(1, (7 - dist) / 5));

  iconEls.forEach((el, i) => {
    const θ = orbitAngle + (i * Math.PI * 2 / N);
    const x = cx + R  * Math.cos(θ);
    const y = cy + Ry * Math.sin(θ);

    // Depth: sin(θ) = +1 → bottom (front, closest), -1 → top (back, furthest)
    const depth   = (Math.sin(θ) + 1) / 2;   // 0 = back, 1 = front
    const scale   = (0.62 + 0.38 * depth) * (1 - zoomT * 0.45);
    const opacity = (0.38 + 0.62 * depth) * (1 - zoomT * 0.85);

    // Front half of orbit: sit above canvas (z:21) so icons pass IN FRONT of model.
    // Back half: sit below canvas (z:15) so model covers them.
    el.style.zIndex    = depth > 0.5 ? '21' : '15';
    el.style.left      = x + 'px';
    el.style.top       = y + 'px';
    el.style.transform = `translate(-50%,-50%) scale(${scale.toFixed(3)})`;
    el.style.opacity   = opacity.toFixed(3);
  });

  // Apply momentum when not actively dragging
  if (!ringDrag.active) {
    ringVelocity *= FRICTION;
    orbitAngle   += ringVelocity;
  }
}

// ────────────────────────────────────────────────────────────
// DRAG-TO-SPIN — horizontal drag rotates the icon ring
// Drag from any icon OR from empty background space.
// Vertical drag → OrbitControls (camera). Horizontal → ring.
// ────────────────────────────────────────────────────────────
const ringDrag = {
  active:   false,
  startX:   0,
  startY:   0,
  lastX:    0,
  isHoriz:  null,   // null=undecided, true=ring, false=camera
  hasMoved: false,
};

function onDragStart(e, fromIcon) {
  ringDrag.startX   = ringDrag.lastX = e.clientX;
  ringDrag.startY   = e.clientY;
  ringDrag.isHoriz  = fromIcon ? true : null;
  ringDrag.active   = fromIcon;
  ringDrag.hasMoved = false;
  ringVelocity      = 0;
  if (fromIcon) {
    e.stopPropagation();
    if (e.target.setPointerCapture) e.target.setPointerCapture(e.pointerId);
  }
}

// Drag starting on any icon
iconEls.forEach(el => {
  el.addEventListener('pointerdown', e => onDragStart(e, true));
  el.addEventListener('click', e => { if (ringDrag.hasMoved) e.preventDefault(); });
});

// Drag starting on background (orbit-target)
document.getElementById('orbit-target')
  .addEventListener('pointerdown', e => onDragStart(e, false));

document.addEventListener('pointermove', e => {
  const dx = e.clientX - ringDrag.startX;
  const dy = e.clientY - ringDrag.startY;

  // Determine axis on first meaningful movement
  if (ringDrag.isHoriz === null && (Math.abs(dx) > 6 || Math.abs(dy) > 6)) {
    ringDrag.isHoriz = Math.abs(dx) >= Math.abs(dy);
    if (ringDrag.isHoriz) {
      ringDrag.active       = true;
      controls.enableRotate = false; // suppress camera yaw while spinning ring
    }
  }

  if (!ringDrag.active) return;

  const ddx = e.clientX - ringDrag.lastX;
  if (Math.abs(ddx) > 2) ringDrag.hasMoved = true;

  // Half-screen width drag ≈ one full revolution
  ringVelocity  = ddx / innerWidth * Math.PI * 2.8;
  orbitAngle   += ringVelocity;
  ringDrag.lastX = e.clientX;
});

document.addEventListener('pointerup', () => {
  ringDrag.active  = false;
  ringDrag.isHoriz = null;
  controls.enableRotate = true;
  // ringVelocity carries momentum in updateIcons()
});

// ────────────────────────────────────────────────────────────
// ARC TEXT  — SVG textPath following the top of the orbit ring
// ────────────────────────────────────────────────────────────
const arcPathEl = document.getElementById('arc-path');
const arcTextEl = document.getElementById('arc-text-el');
const typingEl  = document.getElementById('typing-text');

function updateArcPath() {
  const cx = innerWidth  / 2;
  const cy = innerHeight / 2;
  const R  = getR();

  // Pure circle (not flattened) for maximum visible curvature.
  // Sweeps -162° → -18°  (144° arc) — a wide, clearly curved half-circle at the top.
  const a1 = -162 * Math.PI / 180;
  const a2 =  -18 * Math.PI / 180;

  const x1 = cx + R * Math.cos(a1);
  const y1 = cy + R * Math.sin(a1);
  const x2 = cx + R * Math.cos(a2);
  const y2 = cy + R * Math.sin(a2);

  // rx=R, ry=R → perfect circle arc, sweep=1 (clockwise, left→top→right)
  arcPathEl.setAttribute('d', `M ${x1} ${y1} A ${R} ${R} 0 0 1 ${x2} ${y2}`);

  // Responsive font size
  const fs = Math.max(13, Math.min(19, innerWidth * 0.016));
  const ls = Math.max(7,  Math.min(13, innerWidth * 0.011));
  arcTextEl.setAttribute('font-size',      fs);
  arcTextEl.setAttribute('letter-spacing', ls);
  arcTextEl.setAttribute('fill',          '#ffffff');
  arcTextEl.setAttribute('font-family',   "'Segoe UI', system-ui, sans-serif");
  arcTextEl.setAttribute('font-weight',   '700');
}
updateArcPath();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  updateArcPath();
});

// ────────────────────────────────────────────────────────────
// TYPEWRITER on the arc
// ────────────────────────────────────────────────────────────
const WORD  = 'bdrspen';
let charIdx  = 0;
let erasing  = false;
let cursorOn = true;

// Blinking cursor (toggle independently)
setInterval(() => { cursorOn = !cursorOn; redraw(); }, 530);

function redraw() {
  // Space placeholder keeps arc path visible even when cursor is off
  typingEl.textContent = WORD.slice(0, charIdx) + (cursorOn ? '|' : '\u00a0');
}

function tick() {
  if (!erasing) {
    charIdx++;
    redraw();
    if (charIdx >= WORD.length) {
      // Fully typed — hold, then erase
      setTimeout(() => { erasing = true; tick(); }, 2100);
      return;
    }
    setTimeout(tick, 115);
  } else {
    charIdx--;
    redraw();
    if (charIdx <= 0) {
      charIdx = 0;
      erasing = false;
      setTimeout(tick, 480);
      return;
    }
    setTimeout(tick, 72);
  }
}
setTimeout(tick, 700); // slight delay before first letter

// ── Render loop ───────────────────────────────────────────
(function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  if (mixer) mixer.update(delta);
  controls.update();
  updateIcons();
  renderer.render(scene, camera);
})();
</script>

</body>
</html>
